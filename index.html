<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- 状态栏背景设为纯黑，完美融入上下黑边 -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>GemiLi的打鸭子</title>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            overflow: hidden; 
            background-color: #000; /* 大背景纯黑，充当上下黑边 */
            touch-action: none;
        }
        
        .magic-box {
            position: absolute;
            top: 50%;
            left: 50%;
        }

        /* ⚔️ 16:9 现代宽屏魔法：留出顶部空间给电量和时间 ⚔️ */
        @media screen and (orientation: portrait) {
            .magic-box {
                width: 177.77vw; /* 核心修改：16:9 比例 (100 * 16/9 = 177.77) */
                height: 100vw;   /* 占满手机物理宽度 */
                transform: translate(-50%, -50%) rotate(90deg);
            }
        }

        /* 如果朋友本身就是横屏拿手机，正常 16:9 居中显示 */
        @media screen and (orientation: landscape) {
            .magic-box {
                width: 177.77vh; 
                height: 100vh;
                transform: translate(-50%, -50%) rotate(0deg);
            }
        }

        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>

    <div class="magic-box">
        <iframe src="https://duckhuntjs.com/"></iframe>
    </div>
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
